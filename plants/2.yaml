species: Nephrolepis exaltata (Boston Fern)
sensor_idx: 1
pump_idx: 1
added_at: 2026-04-27

# Cartoon-sprite generation inputs — used by the Gemini image-to-image flow
# documented in prompts/sprites.md. Edit + re-run to regenerate the avatar.
sprite:
  reference_photo: plants/2_fernando.HEIC
  output: dashboard_preview/sprites/2.png
  preserve: |
    - Long arching pinnate fronds (each frond is a central rib with many small
      leaflets along both sides)
    - Cascading habit — fronds spread outward and droop downward in all
      directions, creating a shaggy fountain shape
    - Bright fresh-green color of healthy fronds, with a few older fronds
      showing slight yellowing/browning at the tips for natural character
    - Lush, full appearance: many fronds emerging from the central crown
    - Slight asymmetry — some fronds longer than others, just like the real plant
  real_pot: "a plain black plastic pot"
  artistic_pot: |
    a beautiful artistic terracotta clay pot in warm rust-orange tones with
    subtle decorative band detail near the rim. Visible clay texture and a
    slight gradient for depth. Polished mobile-game collectible style.

# Hand-written for now — Boston ferns have specific quirks (humidity, water
# love) that are worth pinning. Will be regenerated through prompts/care_tips.md
# once that template is finalized.
care_tips:
  watering: "Keep soil consistently moist — water every 3–5 days, never let it dry out completely. Boston ferns drop fronds fast when underwatered. Bottom-water occasionally to keep the root ball evenly hydrated."
  sunlight: "Bright, indirect light. Direct sun will scorch the fronds. Tolerates lower light but grows slower; rotate weekly so all sides stay full."
  soil: "Rich, well-draining potting mix with extra peat or coco coir for moisture retention. Slightly acidic (pH 5.5–6.5). Repot every 2 years or when roots fill the pot."
  temperature: "60–75°F (16–24°C), with humidity above 50%. Mist daily or use a humidifier during winter heating — dry air browns the leaflet tips."

