sensor_idx: 0
pump_idx: 0
added_at: 2026-03-01

# Cartoon-sprite generation inputs — used by the Gemini image-to-image flow
# documented in prompts/sprites.md. Edit + re-run to regenerate the avatar.
sprite:
  reference_photo: plants/goldie.HEIC
  output: dashboard_preview/sprites/1.png
  preserve: |
    - Exact heart-shaped leaf shape
    - Dramatic green-and-yellow marbled variegation with prominent bold yellow
      patches across many leaves (the "golden" in golden pothos)
    - Cascading downward growth habit, leaves trailing well below the pot
    - Many large lush leaves spilling out, mix of fully green leaves and
      heavily yellow-variegated leaves
  real_pot: "a plain black plastic pot"
  artistic_pot: |
    a beautiful hand-woven wicker basket in warm tan-and-cream tones, with
    clearly visible woven texture, a braided rim at the top, and subtle
    shadow/highlight detail

# Generated by Xiaoxia using prompts/care_tips.md.
# Edit freely — Xiaoxia will not regenerate unless you ask.
care_tips:
  watering: "Let the top 1–2 in of soil dry out completely between waterings — typically every 7–10 days. Pothos prefers slight underwatering to overwatering and droops as a clear signal when thirsty."
  sunlight: "Bright, indirect light. Tolerates lower light but loses variegation. Avoid direct sun, which scorches leaves and bleaches the yellow."
  soil: "Well-draining indoor potting mix with perlite. Doesn't mind being slightly root-bound — repot every 2–3 years."
  temperature: "65–85°F (18–29°C). Avoid cold drafts below 50°F and dry heating vents in winter."

# Photo files live on the VPS at /var/lib/waterplant/photos/<id>/<filename>.
