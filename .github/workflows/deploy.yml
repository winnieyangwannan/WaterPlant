# Deploys dashboard_preview/ to GitHub Pages on every push to main.
#
# Uses the modern Pages flow (configure-pages + upload-pages-artifact +
# deploy-pages). No gh-pages branch — the static site is served directly
# from the workflow artifact.
#
# One-time setup: in repo Settings → Pages → Source, choose "GitHub Actions".
# After that, every push to main rebuilds and redeploys automatically.

name: Deploy public preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for the modern deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue redundant deploys. Cancel in-flight runs if a newer one starts.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        # The whole dashboard_preview/ directory becomes the site root.
        # Goldie's page is at /1.html, plant index at /, photos under /photos/<id>/.
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard_preview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
