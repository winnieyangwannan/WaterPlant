name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Trigger the workflow on pushes to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x' # Use the latest available Python 3 version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML Jinja2

      - name: Generate static site
        run: |
          python server/generate_static_site.py

      - name: Configure Git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Commit generated HTML files
        run: |
          # Add all generated HTML files in the root directory
          git add index.html *.html
          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Build: Update static website files"
          else
            echo "No changes to commit."
          fi

      - name: Push generated files to gh-pages branch
        uses: s0/git-publish-gh-pages@v1
        with:
          # Replace 'winnieyangwannan/WaterPlant' with your actual username/repo
          repo: winnieyangwannan/WaterPlant
          # The branch to deploy to
          branch: gh-pages
          # Crucial for project pages: uncomment and set the baseurl
          baseurl: /WaterPlant/
          # Committer username and email (can be customized)
          committer_name: 'GitHub Actions'
          committer_email: 'actions@github.com'
