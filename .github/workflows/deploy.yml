name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML Jinja2

      - name: Generate static site
        run: python server/generate_static_site.py

      - name: Configure Git user
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Deploy to gh-pages
        run: |
          # Checkout the main branch, as the generated files are in the root
          # This ensures we have the latest main branch code to build from
          git checkout main

          # Generate the site content directly in the working directory
          python server/generate_static_site.py

          # Ensure gh-pages branch exists, create/checkout it
          # Using --orphan creates a new branch with no history, useful for a clean deploy
          git checkout --orphan gh-pages
          
          # Add all generated files (HTML etc.)
          git add index.html *.html

          # Commit the generated files
          if ! git diff --cached --quiet; then
            git commit -m "Build: Update static website files from main"
            git push origin gh-pages --force
          else
            echo "No changes to commit to gh-pages."
          fi
